- type: entity
  name: medical pouch
  id: MedicalPouch
  parent: [ NFPouchBase, BaseBagOpenClose ]
  description: A small pouch for pills, bottles, autoinjectors, and syringes. # Euphoria: More descriptive
  components:
  - type: Sprite
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    layers:
    - state: base
      color: "#5a96bb"
    - state: closed
      map: [ "closeLayer" ]
      color: "#5a96bb"
    - state: open
      map: [ "openLayer" ]
      color: "#5a96bb"
      visible: false
    - state: inside
      map: ["insideLayer"]
      visible: false
    - state: fill-chem-1
      map: [ "pouchFill1" ]
      visible: false
    - state: fill-chem-2
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-chem-3
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-chem-4
      map: [ "pouchFill4" ]
      visible: false
    - state: decal-med-cross
      map: [ "decal1" ]
      color: "#ffffff"
  - type: Clothing
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#5a96bb"
      pocket:
      - state: equipped-BELT
        color: "#5a96bb"
  - type: Item
    size: Small
    shape: # Euphoria: Restore shape to intended Frontier shape.
    - 0,0,0,1
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#5a96bb"
      right:
      - state: inhand-right
        color: "#5a96bb"
  - type: Storage
    grid:
    - 0,0,3,2
    whitelist:
      tags:
      - Pill
      - Bottle
      - CentrifugeCompatible # Vial > CentrifugeCompatible
      - Syringe
      - PillCanister # Euphoria: Medical Pouch can contain pill canisters
      components:
      - Injector # Euphoria Injector<Hypospray
    blacklist: # Euphoria: Remove Storage blacklist (medical pouch can contain pill canisters)
      components: []

- type: entity
  name: interdyne medical pouch # Euphoria: interdyne<corpsman's
  id: CorpsmanMedicalPouch
  parent: [ MedicalPouch, BaseSyndicateContraband ]
  description: A small pouch in syndicate colours for pills, bottles, autoinjectors, and syringes. # Euphoria: More descriptive
  components:
  - type: Sprite
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    layers:
    - state: base
      color: "#3e3e48"
    - state: closed
      map: [ "closeLayer" ]
      color: "#3e3e48"
    - state: open
      map: [ "openLayer" ]
      color: "#3e3e48"
      visible: false
    - state: inside
      map: ["insideLayer"]
      visible: false
    - state: fill-chem-1
      map: [ "pouchFill1" ]
      visible: false
    - state: fill-chem-2
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-chem-3
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-chem-4
      map: [ "pouchFill4" ]
      visible: false
    - state: decal-line-01
      map: [ "decal1" ]
      color: "#ca4545"
    - state: decal-med-cross
      map: [ "decal2" ]
      color: "#ede984"
  - type: Clothing
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#3e3e48"
      pocket:
      - state: equipped-BELT
        color: "#3e3e48"
  - type: Item
    size: Small
    sprite: _NF/Objects/Storage/Pouches/pouch_small.rsi
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#3e3e48"
      right:
      - state: inhand-right
        color: "#3e3e48"
  - type: Storage
    grid:
    - 0,0,4,2 #syndie stuffs always bigger
