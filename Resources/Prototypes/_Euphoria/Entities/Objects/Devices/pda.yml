# =========== Alternative PDAs ==============

# Alternative PDA base TG style
- type: entity
  parent: BasePDA
  id: BaseAlternativePDA
  name: Base Alternative PDA
  description: Personal Data Assistant.
  components:
  - type: Pda
    id: PassengerIDCard
  - type: Sprite
    sprite: _Floof/Objects/Devices/alternative_head_pda.rsi
    state: pda
    scale: 1.02, 1.02 # increase the scale to match the size of delta-v pdas
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      offset: 0.1, 0.0 # 1.5 is WAY TOO FUCKING FAR, like in the next universe far
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      offset: 0.11, 0.1 # 0.125 is too far to the right
      shader: "unshaded"
      visible: false
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda
  - type: Icon
    sprite: _Floof/Objects/Devices/alternative_head_pda.rsi
    state: pda
  - type: CartridgeLoader # Nyanotrasen - Glimmer Monitor
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - NanoChatCartridge

# Alternative PDA base DV style
- type: entity
  abstract: true
  parent: BasePDA
  id: BaseAlternativePDA2
  name: Base Alternative PDA
  description: Personal Data Assistant.
  components:
  - type: Sprite
    sprite: _Floof/Objects/Devices/alternative_pda.rsi # DeltaV aPDA Resprite File Path
    scale: 0.75, 0.75 # DeltaV aPDA Resprite PDA Size change, makes it smaller for the full detail.
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"

